<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <link rel="stylesheet" href="assets/css/all.css">
    <style type="text/css">
        .myClass {
          color: #FF0000;
          border: 1px solid #000000;
          cj: test;
          --fa: "\f16d";
        }
    </style>
</head>
<body>
  <i class="fa-solid fa-laptop"></i>
  <i class="fa-solid fa-user"></i>
  <i class="fa-regular fa-laptop-arrow-down"></i>
  <i class="fa-brands fa-instagram"></i>
  <i class="fa-solid fa-hashtag"></i>
  <i class="fa-brands fa-youtube"></i>
  <div id="divResults"></div>
  <script>
    function getUnicodeByName(iconName)
  {
    const objElement = document.createElement('i');
    objElement.className = iconName;
    document.body.appendChild(objElement);
    const objStyles = window.getComputedStyle(objElement);
    const faUnicode = objStyles.getPropertyValue('--fa');
    console.log(iconName + ": " + faUnicode);
    return faUnicode;
  }

  function getFAList(strClassName)
  {
    const elements = document.querySelectorAll(`.${strClassName}`);

    elements.forEach(element => {
      console.log(element);
      const styles = element.computedStyleMap()
      const objFAProp = styles.get("--fa"); //CSSUnparsedValue
      console.log(objFAProp);
      const objStyles = window.getComputedStyle(element); //CSSStyleDeclaration
      //console.log(objStyles);
      const strFAUnicode = objStyles.getPropertyValue('--fa');
      console.log(strFAUnicode);
    });
  }

  getFAList("fa-solid");
  getFAList("fa-brands");
  //document.getElementById("divResults").innerHTML = getUnicodeByName("fa-brands fa-instagram");
  //document.getElementById("divResults").innerHTML = document.getElementById("divResults").innerHTML + getUnicodeByName("fa-brands fa-facebook");
  </script>
</body>
</html>
